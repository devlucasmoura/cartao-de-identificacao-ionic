

<ion-content class="ion-padding ion-text-center">
  <ion-grid>
    <ion-row class="ion-justify-content-center">
      <ion-col size="12" size-md="8" size-lg="6">
        
        <ion-card>
          <div style="display: flex; justify-content: center; margin-top: 20px;">
            <img src="assets/minha-foto.jpg" 
                 style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 3px solid var(--ion-color-primary);" />
          </div>
          
          <ion-card-header>
            <ion-card-title>LUCAS DA SILVA DE MOURA</ion-card-title>
          </ion-card-header>

          <ion-card-content class="modern-info-container">
  
  <div class="glass-info-row">
    <div class="icon-with-neon">
      <img src="./assets/turma.png" class="neon-icon" alt="Turma">
    </div>
    <div class="text-group">
      <strong>Turma</strong>
      <p>ADS - ADS0301M</p>
    </div>
  </div>

  <div class="glass-info-row">
    <div class="icon-with-neon">
      <img src="./assets/unidade.png" class="neon-icon" alt="Unidade">
    </div>
    <div class="text-group">
      <strong>Unidade</strong>
      <p>Bonsucesso</p>
    </div>
  </div>

  <div class="glass-info-row">
    <div class="icon-with-neon">
      <img src="./assets/turno.png" class="neon-icon" alt="Turno">
    </div>
    <div class="text-group">
      <strong>Turno</strong>
      <p>Manhã</p>
    </div>
  </div>

</ion-card-content>

          <ion-footer class="ion-no-border ion-padding">
            <ion-button expand="block" routerLink="/sobre" shape="round">
              Ver mais detalhes
            </ion-button>
          </ion-footer>
        </ion-card>

      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
